<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS-Convert — Privacy First</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Добавлены необходимые библиотеки для конвертации -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#4f46e5' } } }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(17, 24, 39, 0.8); }
        .header-control { height: 40px; display: flex; align-items: center; justify-content: center; }
        .modal-animate { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col">

<header class="sticky top-0 z-50 glass border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-brand rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand/20">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </div>
            <span class="text-xl font-bold tracking-tight">JS-Convert</span>
        </div>

        <div class="flex items-center gap-3">
            <button id="aboutBtn" class="header-control gap-2 px-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-brand transition-all text-xs font-bold shadow-sm">
                <i data-lucide="info" class="w-4 h-4 text-brand"></i>
                <span id="aboutBtnText"></span>
            </button>

            <a href="https://github.com/Xenofff/JS-Convert" target="_blank" class="header-control w-10 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-brand transition-all shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-700 dark:text-slate-200">
                    <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
                    <path d="M9 18c-4.51 2-5-2-7-2"></path>
                </svg>
            </a>

            <div class="header-control bg-slate-200/50 dark:bg-slate-800 rounded-xl px-1 border border-slate-200 dark:border-slate-700">
                <button id="langEn" class="px-3 h-8 text-[10px] font-black rounded-lg transition-all">EN</button>
                <button id="langRu" class="px-3 h-8 text-[10px] font-black rounded-lg transition-all">RU</button>
            </div>

            <button id="themeToggle" class="header-control w-10 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-brand transition-all shadow-sm">
                <i data-lucide="sun" class="w-5 h-5 block dark:hidden text-orange-500"></i>
                <i data-lucide="moon" class="w-5 h-5 hidden dark:block text-blue-400"></i>
            </button>
        </div>
    </div>
</header>

<main class="flex-grow max-w-4xl mx-auto px-6 py-12 w-full">
    <div class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-black mb-4 bg-gradient-to-r from-brand to-violet-500 bg-clip-text text-transparent">
            JS-Convert
        </h1>
        <p id="subtitle" class="text-slate-500 dark:text-slate-400 font-medium"></p>
    </div>

    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 dark:shadow-none overflow-hidden">
        <div class="p-8 md:p-12">
            <div class="grid md:grid-cols-2 gap-10 items-center">
                <div id="dropzone" class="relative group cursor-pointer border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-3xl p-10 transition-all hover:border-brand hover:bg-brand/5 flex flex-col items-center justify-center min-h-[240px]">
                    <input type="file" id="fileInput" class="hidden" multiple />
                    <div class="w-16 h-16 bg-slate-50 dark:bg-slate-800 rounded-2xl flex items-center justify-center text-slate-400 group-hover:text-brand group-hover:scale-110 transition-all mb-4">
                        <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                    </div>
                    <p id="dropText" class="text-sm font-semibold text-slate-600 dark:text-slate-300 text-center"></p>
                    <div id="filesList" class="mt-4 w-full max-h-32 overflow-y-auto space-y-1 hidden">
                        <!-- Список файлов будет здесь -->
                    </div>
                    <p id="fileCountDisplay" class="mt-2 text-xs font-bold text-brand bg-brand/10 px-3 py-1 rounded-full hidden"></p>
                </div>

                <div class="flex flex-col gap-6">
                    <div class="space-y-2">
                        <label id="labelTo" class="block text-[10px] font-black uppercase tracking-[0.1em] text-slate-400"></label>
                        <select id="targetFormat" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl px-5 py-4 outline-none focus:ring-2 ring-brand/50 transition-all appearance-none cursor-pointer font-bold">
                            <option value="image/png">PNG</option>
                            <option value="image/jpeg">JPEG</option>
                            <option value="image/webp">WEBP</option>
                            <option value="application/pdf">PDF</option>
                            <option value="application/json">JSON</option>
                            <option value="text/csv">CSV</option>
                        </select>
                    </div>
                    <button id="convertBtn" class="w-full bg-brand hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-brand/25 transition-all active:scale-[0.97] flex items-center justify-center gap-3">
                        <span id="btnText"></span>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                    <div id="conversionStatus" class="text-xs text-slate-500 dark:text-slate-400 text-center hidden"></div>
                </div>
            </div>
        </div>
        <div class="h-1.5 w-full bg-slate-100 dark:bg-slate-800">
            <div id="progressInner" class="h-full bg-brand transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>
    </div>
</main>

<footer class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 py-12">
    <div class="max-w-5xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12 mb-12">
            <div class="space-y-4">
                <h4 class="text-xs font-black uppercase tracking-widest text-slate-400">JS-Convert</h4>
                <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed font-medium" id="footerAboutText"></p>
            </div>
            <div class="space-y-4">
                <h4 id="footerSecTitle" class="text-xs font-black uppercase tracking-widest text-slate-400"></h4>
                <ul class="text-sm space-y-3 font-bold text-slate-600 dark:text-slate-300">
                    <li class="flex items-center gap-2"><i data-lucide="shield-check" class="w-4 h-4 text-emerald-500"></i> <span id="sec1"></span></li>
                    <li class="flex items-center gap-2"><i data-lucide="lock" class="w-4 h-4 text-emerald-500"></i> <span id="sec2"></span></li>
                    <li class="flex items-center gap-2"><i data-lucide="code" class="w-4 h-4 text-emerald-500"></i> <span id="sec3"></span></li>
                </ul>
            </div>
            <div class="space-y-4">
                <h4 id="footerSupTitle" class="text-xs font-black uppercase tracking-widest text-slate-400"></h4>
                <a href="https://www.donationalerts.com/r/youtubervvs" target="_blank" class="flex items-center gap-3 p-4 bg-brand/5 border border-brand/10 rounded-2xl hover:bg-brand/10 transition-all group">
                    <div class="w-10 h-10 bg-brand rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand/20">
                        <i data-lucide="coffee" class="w-5 h-5 group-hover:animate-bounce"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black uppercase text-brand tracking-wider" id="coffeeTitle"></p>
                        <p class="text-xs font-bold text-slate-600 dark:text-slate-300">DonationAlerts</p>
                    </div>
                </a>
            </div>
        </div>

        <div class="pt-8 border-t border-slate-100 dark:border-slate-800 flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left">
            <p id="copyright" class="text-xs font-bold text-slate-400 uppercase tracking-widest"></p>
            <a href="https://github.com/Xenofff" target="_blank" class="text-xs font-bold text-slate-400 hover:text-brand transition-colors uppercase tracking-widest">Developed by Xenofff</a>
        </div>
    </div>
</footer>

<div id="aboutModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-md">
    <div class="bg-white dark:bg-slate-900 w-full max-w-xl rounded-[2.5rem] p-10 shadow-2xl modal-animate border border-slate-200 dark:border-slate-800">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-brand/10 text-brand rounded-xl flex items-center justify-center">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>
                <h3 id="modalTitle" class="text-2xl font-black tracking-tight text-brand"></h3>
            </div>
            <button id="closeModal" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                <i data-lucide="x" class="w-6 h-6 text-slate-400"></i>
            </button>
        </div>
        <div id="modalBody" class="space-y-6 text-slate-600 dark:text-slate-400 text-sm leading-relaxed font-medium"></div>

        <div class="mt-10 pt-6 border-t border-slate-100 dark:border-slate-800 flex justify-center w-full">
            <a href="https://github.com/Xenofff" target="_blank" class="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-brand transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
                <span>Developed by Xenofff</span>
            </a>
        </div>
    </div>
</div>

<script type="module">
    // --- i18n ---
    const i18n = {
        en: {
            subtitle: 'Supports Images (PNG, JPG, WEBP), PDF, JSON & CSV. 100% private.',
            drop: 'Drag & drop files here or click to select',
            convert: 'Convert Now',
            labelTo: 'Convert To',
            aboutBtn: 'About',
            footerAbout: 'Open source local file converter. Your privacy is our top priority.',
            footerSecTitle: 'Security',
            footerSupTitle: 'Support',
            sec1: 'No Servers',
            sec2: '100% Client-side',
            sec3: 'Open Source',
            coffeeTitle: 'Support the project',
            copyright: '© 2026 JS-Convert • Local & Secure',
            modalTitle: 'Privacy & Technology',
            modalContent: `
                    <p><strong>JS-Convert</strong> is built on the principle of absolute privacy. Unlike traditional converters, we don't have a "backend" server that sees your data.</p>
                    <p><strong>How it works:</strong> Your browser acts as the engine. When you upload a file, JavaScript libraries process the data directly in your RAM. The file is transformed and offered for download without a single byte being sent over the internet.</p>
                    <p><strong>Why it's safe:</strong> Even if your internet connection is cut mid-conversion, the process will finish. Your sensitive documents, photos, and data remain under your total control.</p>
                `,
            filesSelected: 'files selected',
            converting: 'Converting',
            of: 'of',
            complete: 'Complete!',
            error: 'Error'
        },
        ru: {
            subtitle: 'Поддержка изображений (PNG, JPG, WEBP), PDF, JSON и CSV. 100% приватно.',
            drop: 'Перетащите файлы сюда или кликните для выбора',
            convert: 'Конвертировать',
            labelTo: 'Конвертировать в',
            aboutBtn: 'О проекте',
            footerAbout: 'Локальный конвертер файлов с открытым исходным кодом. Ваша приватность — наш приоритет.',
            footerSecTitle: 'Безопасность',
            footerSupTitle: 'Поддержка',
            sec1: 'Без серверов',
            sec2: '100% в браузере',
            sec3: 'Открытый код',
            coffeeTitle: 'Поддержать проект',
            copyright: '© 2026 JS-Convert • Приватно и Безопасно',
            modalTitle: 'Приватность и технологии',
            modalContent: `
                    <p><strong>JS-Convert</strong> построен на принципе абсолютной анонимности. В отличие от обычных сервисов, у нас нет сервера, который "видит" ваши данные.</p>
                    <p><strong>Как это работает:</strong> Ваш браузер сам выступает в роли движка. Когда вы выбираете файл, библиотеки JavaScript обрабатывают данные прямо в оперативной памяти вашего устройства. Файл конвертируется локально, без отправки в интернет.</p>
                    <p><strong>Почему это безопасно:</strong> Даже если вы отключите интернет в процессе работы, всё будет работать. Ваши личные документы и данные остаются только под вашим контролем.</p>
                `,
            filesSelected: 'файлов выбрано',
            converting: 'Конвертация',
            of: 'из',
            complete: 'Готово!',
            error: 'Ошибка'
        }
    };

    let currentLang = localStorage.getItem('lang') || (navigator.language.startsWith('ru') ? 'ru' : 'en');

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('subtitle').textContent = t.subtitle;
        document.getElementById('dropText').textContent = t.drop;
        document.getElementById('btnText').textContent = t.convert;
        document.getElementById('labelTo').textContent = t.labelTo;
        document.getElementById('aboutBtnText').textContent = t.aboutBtn;

        document.getElementById('footerAboutText').textContent = t.footerAbout;
        document.getElementById('footerSecTitle').textContent = t.footerSecTitle;
        document.getElementById('footerSupTitle').textContent = t.footerSupTitle;
        document.getElementById('sec1').textContent = t.sec1;
        document.getElementById('sec2').textContent = t.sec2;
        document.getElementById('sec3').textContent = t.sec3;
        document.getElementById('coffeeTitle').textContent = t.coffeeTitle;
        document.getElementById('copyright').textContent = t.copyright;

        document.getElementById('modalTitle').textContent = t.modalTitle;
        document.getElementById('modalBody').innerHTML = t.modalContent;

        document.getElementById('langEn').className = `px-3 h-8 text-[10px] font-black rounded-lg transition-all ${currentLang === 'en' ? 'bg-white dark:bg-slate-700 shadow-sm text-brand' : 'text-slate-400 hover:text-slate-600'}`;
        document.getElementById('langRu').className = `px-3 h-8 text-[10px] font-black rounded-lg transition-all ${currentLang === 'ru' ? 'bg-white dark:bg-slate-700 shadow-sm text-brand' : 'text-slate-400 hover:text-slate-600'}`;

        // Обновляем текст счетчика файлов если он есть
        const fileCountDisplay = document.getElementById('fileCountDisplay');
        if (fileCountDisplay && !fileCountDisplay.classList.contains('hidden')) {
            const count = selectedFiles.length;
            fileCountDisplay.textContent = `${count} ${t.filesSelected}`;
        }

        lucide.createIcons();
    }

    // --- Theme ---
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    themeToggle.onclick = () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        setTimeout(() => lucide.createIcons(), 10);
    };

    // --- Modal ---
    const aboutModal = document.getElementById('aboutModal');
    document.getElementById('aboutBtn').onclick = () => aboutModal.classList.remove('hidden');
    document.getElementById('closeModal').onclick = () => aboutModal.classList.add('hidden');
    window.onclick = (e) => { if(e.target === aboutModal) aboutModal.classList.add('hidden'); };

    document.getElementById('langEn').onclick = () => { currentLang = 'en'; localStorage.setItem('lang', 'en'); updateUI(); };
    document.getElementById('langRu').onclick = () => { currentLang = 'ru'; localStorage.setItem('lang', 'ru'); updateUI(); };

    updateUI();

    // --- File Handling & Conversion Logic (UI untouched) ---
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const filesList = document.getElementById('filesList');
    const fileCountDisplay = document.getElementById('fileCountDisplay');
    const convertBtn = document.getElementById('convertBtn');
    const targetFormat = document.getElementById('targetFormat');
    const progressInner = document.getElementById('progressInner');
    const conversionStatus = document.getElementById('conversionStatus');

    let selectedFiles = [];

    // Открытие проводника при клике на dropzone
    dropzone.addEventListener('click', () => {
        fileInput.click();
    });

    // Обработка выбора файлов через input
    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (files.length > 0) {
            addFiles(files);
        }
        fileInput.value = '';
    });

    // Drag & drop
    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('border-brand', 'bg-brand/5');
    });

    dropzone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropzone.classList.remove('border-brand', 'bg-brand/5');
    });

    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('border-brand', 'bg-brand/5');
        const files = Array.from(e.dataTransfer.files);
        if (files.length > 0) {
            addFiles(files);
        }
    });

    function addFiles(files) {
        selectedFiles.push(...files);
        updateFilesList();
    }

    function updateFilesList() {
        const t = i18n[currentLang];

        if (selectedFiles.length === 0) {
            filesList.classList.add('hidden');
            fileCountDisplay.classList.add('hidden');
            filesList.innerHTML = '';
            return;
        }

        filesList.classList.remove('hidden');
        fileCountDisplay.classList.remove('hidden');

        // Обновляем счетчик
        fileCountDisplay.textContent = `${selectedFiles.length} ${t.filesSelected}`;

        // Создаем список файлов
        filesList.innerHTML = '';
        selectedFiles.forEach((file, index) => {
            const fileItem = document.createElement('div');
            fileItem.className = 'flex items-center justify-between text-xs bg-slate-100 dark:bg-slate-800 rounded-lg px-3 py-1.5';

            const fileInfo = document.createElement('div');
            fileInfo.className = 'flex items-center gap-2 flex-1 min-w-0';

            const fileIcon = document.createElement('i');
            fileIcon.setAttribute('data-lucide', 'file');
            fileIcon.className = 'w-3 h-3 text-slate-500 flex-shrink-0';

            const fileName = document.createElement('span');
            fileName.className = 'truncate text-slate-700 dark:text-slate-300';
            fileName.textContent = file.name;

            const fileSize = document.createElement('span');
            fileSize.className = 'text-slate-400 flex-shrink-0';
            fileSize.textContent = formatFileSize(file.size);

            fileInfo.appendChild(fileIcon);
            fileInfo.appendChild(fileName);

            const removeBtn = document.createElement('button');
            removeBtn.className = 'ml-2 p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded transition-colors flex-shrink-0';
            removeBtn.innerHTML = '<i data-lucide="x" class="w-3 h-3"></i>';
            removeBtn.onclick = (e) => {
                e.stopPropagation();
                selectedFiles.splice(index, 1);
                updateFilesList();
            };

            fileItem.appendChild(fileInfo);
            fileItem.appendChild(fileSize);
            fileItem.appendChild(removeBtn);
            filesList.appendChild(fileItem);
        });

        lucide.createIcons();
    }

    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function clearFiles() {
        selectedFiles = [];
        updateFilesList();
    }

    // --- Конвертация ---
    convertBtn.addEventListener('click', async () => {
        if (selectedFiles.length === 0) {
            alert(currentLang === 'ru' ? 'Пожалуйста, выберите файлы' : 'Please select files');
            return;
        }

        const t = i18n[currentLang];
        const targetMime = targetFormat.value;
        const totalFiles = selectedFiles.length;
        let processedFiles = 0;
        let hasErrors = false;

        convertBtn.disabled = true;
        conversionStatus.classList.remove('hidden');
        progressInner.style.width = '0%';

        // Если файлов больше одного, создаем ZIP архив
        const createZip = totalFiles > 1;
        let zip = createZip ? new JSZip() : null;

        for (let i = 0; i < selectedFiles.length; i++) {
            const file = selectedFiles[i];
            const progress = ((i) / totalFiles) * 100;
            progressInner.style.width = progress + '%';
            conversionStatus.textContent = `${t.converting} ${i + 1} ${t.of} ${totalFiles}: ${file.name}`;

            try {
                const resultBlob = await convertFile(file, targetMime);

                if (createZip) {
                    const fileName = generateFileName(file.name, targetMime);
                    zip.file(fileName, resultBlob);
                } else {
                    // Если один файл, сразу скачиваем
                    const fileName = generateFileName(file.name, targetMime);
                    downloadBlob(resultBlob, fileName);
                }

                processedFiles++;
            } catch (error) {
                console.error(`Error converting ${file.name}:`, error);
                hasErrors = true;
                // Продолжаем с другими файлами
            }
        }

        progressInner.style.width = '100%';

        if (createZip && processedFiles > 0) {
            conversionStatus.textContent = `${t.converting} ZIP...`;
            try {
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                const zipName = `converted_files_${new Date().getTime()}.zip`;
                downloadBlob(zipBlob, zipName);
                conversionStatus.textContent = t.complete;
            } catch (error) {
                console.error('Error creating ZIP:', error);
                hasErrors = true;
            }
        } else if (processedFiles === 0) {
            conversionStatus.textContent = t.error;
        } else {
            conversionStatus.textContent = t.complete;
        }

        // Сбрасываем состояние
        setTimeout(() => {
            convertBtn.disabled = false;
            progressInner.style.width = '0%';
            conversionStatus.classList.add('hidden');
            if (!hasErrors) {
                clearFiles();
            }
        }, 2000);
    });

    async function convertFile(file, targetMime) {
        const fileType = file.type;
        const fileName = file.name;

        if (fileType.startsWith('image/') || fileName.match(/\.(png|jpe?g|webp|bmp|gif)$/i)) {
            return await convertImage(file, targetMime);
        } else if (fileType === 'application/pdf' || fileName.endsWith('.pdf')) {
            if (targetMime === 'application/pdf') {
                return file;
            } else if (targetMime.startsWith('image/')) {
                return await pdfToImage(file, targetMime);
            } else {
                throw new Error('Unsupported conversion from PDF to ' + targetMime);
            }
        } else if (fileType === 'application/json' || fileName.endsWith('.json')) {
            if (targetMime === 'text/csv') {
                return await jsonToCsvBlob(file);
            } else {
                throw new Error('Unsupported conversion from JSON');
            }
        } else if (fileType === 'text/csv' || fileName.endsWith('.csv')) {
            if (targetMime === 'application/json') {
                return await csvToJsonBlob(file);
            } else {
                throw new Error('Unsupported conversion from CSV');
            }
        } else {
            // Пробуем как изображение
            if (targetMime.startsWith('image/')) {
                return await convertImage(file, targetMime);
            } else {
                throw new Error('Unsupported file type');
            }
        }
    }

    function generateFileName(originalName, targetMime) {
        const baseName = originalName.replace(/\.[^/.]+$/, '');
        let extension = '';
        if (targetMime === 'image/png') extension = '.png';
        else if (targetMime === 'image/jpeg') extension = '.jpg';
        else if (targetMime === 'image/webp') extension = '.webp';
        else if (targetMime === 'application/pdf') extension = '.pdf';
        else if (targetMime === 'application/json') extension = '.json';
        else if (targetMime === 'text/csv') extension = '.csv';
        else extension = '';
        return baseName + extension;
    }

    function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // --- Вспомогательные функции конвертации ---
    async function convertImage(blob, targetMime) {
        const img = await loadImageFromBlob(blob);
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        let quality = 0.92;
        if (targetMime === 'image/png') quality = 1;
        return new Promise(resolve => canvas.toBlob(resolve, targetMime, quality));
    }

    function loadImageFromBlob(blob) {
        return new Promise((resolve, reject) => {
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
            img.onerror = reject;
            img.src = url;
        });
    }

    async function pdfToImage(pdfBlob, targetMime) {
        const arrayBuffer = await pdfBlob.arrayBuffer();
        const loadingTask = window.pdfjsLib.getDocument({ data: arrayBuffer });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: context, viewport }).promise;
        let quality = 0.92;
        if (targetMime === 'image/png') quality = 1;
        return new Promise(resolve => canvas.toBlob(resolve, targetMime, quality));
    }

    async function jsonToCsvBlob(jsonBlob) {
        const text = await jsonBlob.text();
        const json = JSON.parse(text);
        if (!Array.isArray(json) || json.length === 0) throw new Error('JSON must be a non-empty array');
        const headers = Object.keys(json[0]);
        const lines = [headers.join(',')];
        json.forEach(row => {
            const line = headers.map(h => {
                const v = row[h] != null ? row[h] : '';
                const s = String(v).replace(/"/g, '""');
                if (s.includes(',') || s.includes('\n')) return '"' + s + '"';
                return s;
            }).join(',');
            lines.push(line);
        });
        return new Blob([lines.join('\n')], { type: 'text/csv' });
    }

    async function csvToJsonBlob(csvBlob) {
        const text = await csvBlob.text();
        const results = window.Papa.parse(text, { header: true, skipEmptyLines: true, dynamicTyping: true });
        const jsonStr = JSON.stringify(results.data, null, 2);
        return new Blob([jsonStr], { type: 'application/json' });
    }
</script>
