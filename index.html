        tailwind.config = {
            darkMode: 'class',

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

</head>

                    <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>

<main class="flex-grow max-w-4xl mx-auto px-6 py-12 w-full">

                <span>Developed by Xenofff</span>

<script type="module">
    // --- i18n ---
    const i18n = {
        en: {
            subtitle: 'Supports Images (PNG, JPG, WEBP), PDF, JSON & CSV. 100% private.',
            drop: 'Drag & drop image, PDF, JSON or CSV here',
            convert: 'Convert Now',
            labelTo: 'Convert To',
            aboutBtn: 'About',
            footerAbout: 'Open source local file converter. Your privacy is our top priority.',
            footerSecTitle: 'Security',
            footerSupTitle: 'Support',
            sec1: 'No Servers',
            sec2: '100% Client-side',
            sec3: 'Open Source',
            coffeeTitle: 'Support the project',
            copyright: '© 2026 SecureConvert • Local & Secure',
            modalTitle: 'Privacy & Technology',
            modalContent: `
                    <p><strong>SecureConvert</strong> is built on the principle of absolute privacy. Unlike traditional converters, we don't have a "backend" server that sees your data.</p>
                    <p><strong>How it works:</strong> Your browser acts as the engine. When you upload a file, JavaScript libraries process the data directly in your RAM. The file is transformed and offered for download without a single byte being sent over the internet.</p>
                    <p><strong>Why it's safe:</strong> Even if your internet connection is cut mid-conversion, the process will finish. Your sensitive documents, photos, and data remain under your total control.</p>
                `
        },
        ru: {
            subtitle: 'Поддержка изображений (PNG, JPG, WEBP), PDF, JSON и CSV. 100% приватно.',
            drop: 'Перетащите изображение, PDF, JSON или CSV файл сюда',
            convert: 'Конвертировать',
            labelTo: 'Конвертировать в',
            aboutBtn: 'О проекте',
            footerAbout: 'Локальный конвертер файлов с открытым исходным кодом. Ваша приватность — наш приоритет.',
            footerSecTitle: 'Безопасность',
            footerSupTitle: 'Поддержка',
            sec1: 'Без серверов',
            sec2: '100% в браузере',
            sec3: 'Открытый код',
            coffeeTitle: 'Поддержать проект',
            copyright: '© 2026 SecureConvert • Приватно и Безопасно',
            modalTitle: 'Приватность и технологии',
            modalContent: `
                    <p><strong>SecureConvert</strong> построен на принципе абсолютной анонимности. В отличие от обычных сервисов, у нас нет сервера, который "видит" ваши данные.</p>
                    <p><strong>Как это работает:</strong> Ваш браузер сам выступает в роли движка. Когда вы выбираете файл, библиотеки JavaScript обрабатывают данные прямо в оперативной памяти вашего устройства. Файл конвертируется локально, без отправки в интернет.</p>
                    <p><strong>Почему это безопасно:</strong> Даже если вы отключите интернет в процессе работы, всё будет работать. Ваши личные документы и данные остаются только под вашим контролем.</p>
                `
        }
    };

    let currentLang = localStorage.getItem('lang') || (navigator.language.startsWith('ru') ? 'ru' : 'en');

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('subtitle').textContent = t.subtitle;
        document.getElementById('dropText').textContent = t.drop;
        document.getElementById('btnText').textContent = t.convert;
        document.getElementById('labelTo').textContent = t.labelTo;
        document.getElementById('aboutBtnText').textContent = t.aboutBtn;

        document.getElementById('footerAboutText').textContent = t.footerAbout;
        document.getElementById('footerSecTitle').textContent = t.footerSecTitle;
        document.getElementById('footerSupTitle').textContent = t.footerSupTitle;
        document.getElementById('sec1').textContent = t.sec1;
        document.getElementById('sec2').textContent = t.sec2;
        document.getElementById('sec3').textContent = t.sec3;
        document.getElementById('coffeeTitle').textContent = t.coffeeTitle;
        document.getElementById('copyright').textContent = t.copyright;

        document.getElementById('modalTitle').textContent = t.modalTitle;
        document.getElementById('modalBody').innerHTML = t.modalContent;

        document.getElementById('langEn').className = `px-3 h-8 text-[10px] font-black rounded-lg transition-all ${currentLang === 'en' ? 'bg-white dark:bg-slate-700 shadow-sm text-brand' : 'text-slate-400 hover:text-slate-600'}`;
        document.getElementById('langRu').className = `px-3 h-8 text-[10px] font-black rounded-lg transition-all ${currentLang === 'ru' ? 'bg-white dark:bg-slate-700 shadow-sm text-brand' : 'text-slate-400 hover:text-slate-600'}`;

        lucide.createIcons();
    }

    // --- Theme ---
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    themeToggle.onclick = () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        setTimeout(() => lucide.createIcons(), 10);
    };

    // --- Modal ---
    const aboutModal = document.getElementById('aboutModal');
    document.getElementById('aboutBtn').onclick = () => aboutModal.classList.remove('hidden');
    document.getElementById('closeModal').onclick = () => aboutModal.classList.add('hidden');
    window.onclick = (e) => { if(e.target === aboutModal) aboutModal.classList.add('hidden'); };

    document.getElementById('langEn').onclick = () => { currentLang = 'en'; localStorage.setItem('lang', 'en'); updateUI(); };
    document.getElementById('langRu').onclick = () => { currentLang = 'ru'; localStorage.setItem('lang', 'ru'); updateUI(); };

    updateUI();

    // --- File Handling & Conversion Logic (UI untouched) ---
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const convertBtn = document.getElementById('convertBtn');
    const targetFormat = document.getElementById('targetFormat');
    const progressInner = document.getElementById('progressInner');

    let selectedFile = null;

    // Открытие проводника при клике на dropzone
    dropzone.addEventListener('click', () => {
        fileInput.click();
    });

    // Обработка выбора файла через input
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            setFile(file);
        }
        // Сбрасываем value, чтобы при повторном выборе того же файла событие срабатывало
        fileInput.value = '';
    });

    // Drag & drop
    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('border-brand', 'bg-brand/5');
    });

    dropzone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropzone.classList.remove('border-brand', 'bg-brand/5');
    });

    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('border-brand', 'bg-brand/5');
        const file = e.dataTransfer.files[0];
        if (file) {
            setFile(file);
        }
    });

    function setFile(file) {
        selectedFile = file;
        fileNameDisplay.textContent = file.name;
        fileNameDisplay.classList.remove('hidden');
    }

    // --- Конвертация ---
    convertBtn.addEventListener('click', async () => {
        if (!selectedFile) {
            alert(currentLang === 'ru' ? 'Пожалуйста, выберите файл' : 'Please select a file');
            return;
        }

        const targetMime = targetFormat.value;
        progressInner.style.width = '10%';

        try {
            let resultBlob;
            const fileType = selectedFile.type;
            const fileName = selectedFile.name;

            // Вспомогательные функции для конвертации (используем те же подходы, что в предоставленных модулях)
            if (fileType.startsWith('image/') || fileName.match(/\.(png|jpe?g|webp|bmp|gif)$/i)) {
                // Изображения: конвертация через canvas
                resultBlob = await convertImage(selectedFile, targetMime);
            } else if (fileType === 'application/pdf' || fileName.endsWith('.pdf')) {
                // PDF -> изображение или остаётся PDF (если цель PDF — просто вернуть оригинал)
                if (targetMime === 'application/pdf') {
                    resultBlob = selectedFile;
                } else if (targetMime.startsWith('image/')) {
                    resultBlob = await pdfToImage(selectedFile, targetMime);
                } else {
                    throw new Error('Unsupported conversion from PDF to ' + targetMime);
                }
            } else if (fileType === 'application/json' || fileName.endsWith('.json')) {
                if (targetMime === 'text/csv') {
                    resultBlob = await jsonToCsvBlob(selectedFile);
                } else {
                    throw new Error('Unsupported conversion from JSON');
                }
            } else if (fileType === 'text/csv' || fileName.endsWith('.csv')) {
                if (targetMime === 'application/json') {
                    resultBlob = await csvToJsonBlob(selectedFile);
                } else {
                    throw new Error('Unsupported conversion from CSV');
                }
            } else {
                // Пробуем как изображение
                if (targetMime.startsWith('image/')) {
                    resultBlob = await convertImage(selectedFile, targetMime);
                } else {
                    throw new Error('Unsupported file type');
                }
            }

            progressInner.style.width = '100%';

            // Генерация имени файла
            const baseName = fileName.replace(/\.[^/.]+$/, '');
            let extension = '';
            if (targetMime === 'image/png') extension = '.png';
            else if (targetMime === 'image/jpeg') extension = '.jpg';
            else if (targetMime === 'image/webp') extension = '.webp';
            else if (targetMime === 'application/pdf') extension = '.pdf';
            else if (targetMime === 'application/json') extension = '.json';
            else if (targetMime === 'text/csv') extension = '.csv';
            else extension = '';

            const newFileName = baseName + extension;

            // Скачивание
            const url = URL.createObjectURL(resultBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = newFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            progressInner.style.width = '0%';
        } catch (error) {
            console.error(error);
            alert('Conversion error: ' + (error.message || 'Unknown error'));
            progressInner.style.width = '0%';
        }
    });

    // --- Вспомогательные функции конвертации (на основе предоставленных файлов) ---
    async function convertImage(blob, targetMime) {
        const img = await loadImageFromBlob(blob);
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        let quality = 0.92;
        if (targetMime === 'image/png') quality = 1;
        return new Promise(resolve => canvas.toBlob(resolve, targetMime, quality));
    }

    function loadImageFromBlob(blob) {
        return new Promise((resolve, reject) => {
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
            img.onerror = reject;
            img.src = url;
        });
    }

    async function pdfToImage(pdfBlob, targetMime) {
        const arrayBuffer = await pdfBlob.arrayBuffer();
        const loadingTask = window.pdfjsLib.getDocument({ data: arrayBuffer });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: context, viewport }).promise;
        let quality = 0.92;
        if (targetMime === 'image/png') quality = 1;
        return new Promise(resolve => canvas.toBlob(resolve, targetMime, quality));
    }

    async function jsonToCsvBlob(jsonBlob) {
        const text = await jsonBlob.text();
        const json = JSON.parse(text);
        if (!Array.isArray(json) || json.length === 0) throw new Error('JSON must be a non-empty array');
        const headers = Object.keys(json[0]);
        const lines = [headers.join(',')];
        json.forEach(row => {
            const line = headers.map(h => {
                const v = row[h] != null ? row[h] : '';
                const s = String(v).replace(/"/g, '""');
                if (s.includes(',') || s.includes('\n')) return '"' + s + '"';
                return s;
            }).join(',');
            lines.push(line);
        });
        return new Blob([lines.join('\n')], { type: 'text/csv' });
    }

    async function csvToJsonBlob(csvBlob) {
        const text = await csvBlob.text();
        const results = window.Papa.parse(text, { header: true, skipEmptyLines: true, dynamicTyping: true });
        const jsonStr = JSON.stringify(results.data, null, 2);
        return new Blob([jsonStr], { type: 'application/json' });
    }
</script>
