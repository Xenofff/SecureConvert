<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureConvert — Privacy First</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#4f46e5' } } }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(17, 24, 39, 0.8); }
        .header-control { height: 40px; display: flex; align-items: center; justify-content: center; }
        .modal-animate { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col">

<header class="sticky top-0 z-50 glass border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-brand rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand/20">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </div>
            <span class="text-xl font-bold tracking-tight">SecureConvert</span>
        </div>

        <div class="flex items-center gap-3">
            <button id="aboutBtn" class="header-control gap-2 px-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-brand transition-all text-xs font-bold shadow-sm">
                <i data-lucide="info" class="w-4 h-4 text-brand"></i>
                <span id="aboutBtnText"></span>
            </button>

            <a href="https://github.com/Xenofff/SecureConvert" target="_blank" class="header-control w-10 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-brand transition-all shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-700 dark:text-slate-200">
                    <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
                    <path d="M9 18c-4.51 2-5-2-7-2"></path>
                </svg>
            </a>

            <div class="header-control bg-slate-200/50 dark:bg-slate-800 rounded-xl px-1 border border-slate-200 dark:border-slate-700">
                <button id="langEn" class="px-3 h-8 text-[10px] font-black rounded-lg transition-all">EN</button>
                <button id="langRu" class="px-3 h-8 text-[10px] font-black rounded-lg transition-all">RU</button>
            </div>

            <button id="themeToggle" class="header-control w-10 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-brand transition-all shadow-sm">
                <i data-lucide="sun" class="w-5 h-5 block dark:hidden text-orange-500"></i>
                <i data-lucide="moon" class="w-5 h-5 hidden dark:block text-blue-400"></i>
            </button>
        </div>
    </div>
</header>

<main class="flex-grow max-w-4xl mx-auto px-6 py-12 w-full">
    <div class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-black mb-4 bg-gradient-to-r from-brand to-violet-500 bg-clip-text text-transparent">
            SecureConvert
        </h1>
        <p id="subtitle" class="text-slate-500 dark:text-slate-400 font-medium"></p>
    </div>

    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 dark:shadow-none overflow-hidden">
        <div class="p-8 md:p-12">
            <div class="grid md:grid-cols-2 gap-10 items-center">
                <div id="dropzone" class="relative group cursor-pointer border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-3xl p-10 transition-all hover:border-brand hover:bg-brand/5 flex flex-col items-center justify-center min-h-[240px]">
                    <input type="file" id="fileInput" class="hidden" />
                    <div class="w-16 h-16 bg-slate-50 dark:bg-slate-800 rounded-2xl flex items-center justify-center text-slate-400 group-hover:text-brand group-hover:scale-110 transition-all mb-4">
                        <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                    </div>
                    <p id="dropText" class="text-sm font-semibold text-slate-600 dark:text-slate-300 text-center"></p>
                    <p id="fileNameDisplay" class="mt-4 text-xs font-bold text-brand bg-brand/10 px-3 py-1 rounded-full hidden"></p>
                </div>

                <div class="flex flex-col gap-6">
                    <div class="space-y-2">
                        <label id="labelTo" class="block text-[10px] font-black uppercase tracking-[0.1em] text-slate-400"></label>
                        <select id="targetFormat" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl px-5 py-4 outline-none focus:ring-2 ring-brand/50 transition-all appearance-none cursor-pointer font-bold">
                            <option value="image/png">PNG</option>
                            <option value="image/jpeg">JPEG</option>
                            <option value="image/webp">WEBP</option>
                            <option value="application/pdf">PDF</option>
                            <option value="application/json">JSON</option>
                            <option value="text/csv">CSV</option>
                        </select>
                    </div>
                    <button id="convertBtn" class="w-full bg-brand hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-brand/25 transition-all active:scale-[0.97] flex items-center justify-center gap-3">
                        <span id="btnText"></span>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="h-1.5 w-full bg-slate-100 dark:bg-slate-800">
            <div id="progressInner" class="h-full bg-brand transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>
    </div>
</main>

<footer class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 py-12">
    <div class="max-w-5xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12 mb-12">
            <div class="space-y-4">
                <h4 class="text-xs font-black uppercase tracking-widest text-slate-400">SecureConvert</h4>
                <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed font-medium" id="footerAboutText"></p>
            </div>
            <div class="space-y-4">
                <h4 id="footerSecTitle" class="text-xs font-black uppercase tracking-widest text-slate-400"></h4>
                <ul class="text-sm space-y-3 font-bold text-slate-600 dark:text-slate-300">
                    <li class="flex items-center gap-2"><i data-lucide="shield-check" class="w-4 h-4 text-emerald-500"></i> <span id="sec1"></span></li>
                    <li class="flex items-center gap-2"><i data-lucide="lock" class="w-4 h-4 text-emerald-500"></i> <span id="sec2"></span></li>
                    <li class="flex items-center gap-2"><i data-lucide="code" class="w-4 h-4 text-emerald-500"></i> <span id="sec3"></span></li>
                </ul>
            </div>
            <div class="space-y-4">
                <h4 id="footerSupTitle" class="text-xs font-black uppercase tracking-widest text-slate-400"></h4>
                <a href="https://www.donationalerts.com/r/youtubervvs" target="_blank" class="flex items-center gap-3 p-4 bg-brand/5 border border-brand/10 rounded-2xl hover:bg-brand/10 transition-all group">
                    <div class="w-10 h-10 bg-brand rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand/20">
                        <i data-lucide="coffee" class="w-5 h-5 group-hover:animate-bounce"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black uppercase text-brand tracking-wider" id="coffeeTitle"></p>
                        <p class="text-xs font-bold text-slate-600 dark:text-slate-300">DonationAlerts</p>
                    </div>
                </a>
            </div>
        </div>

        <div class="pt-8 border-t border-slate-100 dark:border-slate-800 flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left">
            <p id="copyright" class="text-xs font-bold text-slate-400 uppercase tracking-widest"></p>
            <a href="https://github.com/Xenofff" target="_blank" class="text-xs font-bold text-slate-400 hover:text-brand transition-colors uppercase tracking-widest">Developed by Xenofff</a>
        </div>
    </div>
</footer>

<div id="aboutModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-md">
    <div class="bg-white dark:bg-slate-900 w-full max-w-xl rounded-[2.5rem] p-10 shadow-2xl modal-animate border border-slate-200 dark:border-slate-800">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-brand/10 text-brand rounded-xl flex items-center justify-center">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>
                <h3 id="modalTitle" class="text-2xl font-black tracking-tight text-brand"></h3>
            </div>
            <button id="closeModal" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                <i data-lucide="x" class="w-6 h-6 text-slate-400"></i>
            </button>
        </div>
        <div id="modalBody" class="space-y-6 text-slate-600 dark:text-slate-400 text-sm leading-relaxed font-medium"></div>

        <div class="mt-10 pt-6 border-t border-slate-100 dark:border-slate-800 flex justify-center w-full">
            <a href="https://github.com/Xenofff" target="_blank" class="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-brand transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
                <span>Developed by Xenofff</span>
            </a>
        </div>
    </div>
</div>

<script type="module">
    const i18n = {
        en: {
            subtitle: 'Supports Images (PNG, JPG, WEBP), PDF, JSON & CSV. 100% private.',
            drop: 'Drag & drop image, PDF, JSON or CSV here',
            convert: 'Convert Now',
            labelTo: 'Convert To',
            aboutBtn: 'About',
            footerAbout: 'Open source local file converter. Your privacy is our top priority.',
            footerSecTitle: 'Security',
            footerSupTitle: 'Support',
            sec1: 'No Servers',
            sec2: '100% Client-side',
            sec3: 'Open Source',
            coffeeTitle: 'Support the project',
            copyright: '© 2026 SecureConvert • Local & Secure',
            modalTitle: 'Privacy & Technology',
            modalContent: `
                    <p><strong>SecureConvert</strong> is built on the principle of absolute privacy. Unlike traditional converters, we don't have a "backend" server that sees your data.</p>
                    <p><strong>How it works:</strong> Your browser acts as the engine. When you upload a file, JavaScript libraries process the data directly in your RAM. The file is transformed and offered for download without a single byte being sent over the internet.</p>
                    <p><strong>Why it's safe:</strong> Even if your internet connection is cut mid-conversion, the process will finish. Your sensitive documents, photos, and data remain under your total control.</p>
                `
        },
        ru: {
            subtitle: 'Поддержка изображений (PNG, JPG, WEBP), PDF, JSON и CSV. 100% приватно.',
            drop: 'Перетащите изображение, PDF, JSON или CSV файл сюда',
            convert: 'Конвертировать',
            labelTo: 'Конвертировать в',
            aboutBtn: 'О проекте',
            footerAbout: 'Локальный конвертер файлов с открытым исходным кодом. Ваша приватность — наш приоритет.',
            footerSecTitle: 'Безопасность',
            footerSupTitle: 'Поддержка',
            sec1: 'Без серверов',
            sec2: '100% в браузере',
            sec3: 'Открытый код',
            coffeeTitle: 'Поддержать проект',
            copyright: '© 2026 SecureConvert • Приватно и Безопасно',
            modalTitle: 'Приватность и технологии',
            modalContent: `
                    <p><strong>SecureConvert</strong> построен на принципе абсолютной анонимности. В отличие от обычных сервисов, у нас нет сервера, который "видит" ваши данные.</p>
                    <p><strong>Как это работает:</strong> Ваш браузер сам выступает в роли движка. Когда вы выбираете файл, библиотеки JavaScript обрабатывают данные прямо в оперативной памяти вашего устройства. Файл конвертируется локально, без отправки в интернет.</p>
                    <p><strong>Почему это безопасно:</strong> Даже если вы отключите интернет в процессе работы, всё будет работать. Ваши личные документы и данные остаются только под вашим контролем.</p>
                `
        }
    };

    let currentLang = localStorage.getItem('lang') || (navigator.language.startsWith('ru') ? 'ru' : 'en');

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('subtitle').textContent = t.subtitle;
        document.getElementById('dropText').textContent = t.drop;
        document.getElementById('btnText').textContent = t.convert;
        document.getElementById('labelTo').textContent = t.labelTo;
        document.getElementById('aboutBtnText').textContent = t.aboutBtn;

        document.getElementById('footerAboutText').textContent = t.footerAbout;
        document.getElementById('footerSecTitle').textContent = t.footerSecTitle;
        document.getElementById('footerSupTitle').textContent = t.footerSupTitle;
        document.getElementById('sec1').textContent = t.sec1;
        document.getElementById('sec2').textContent = t.sec2;
        document.getElementById('sec3').textContent = t.sec3;
        document.getElementById('coffeeTitle').textContent = t.coffeeTitle;
        document.getElementById('copyright').textContent = t.copyright;

        document.getElementById('modalTitle').textContent = t.modalTitle;
        document.getElementById('modalBody').innerHTML = t.modalContent;

        document.getElementById('langEn').className = `px-3 h-8 text-[10px] font-black rounded-lg transition-all ${currentLang === 'en' ? 'bg-white dark:bg-slate-700 shadow-sm text-brand' : 'text-slate-400 hover:text-slate-600'}`;
        document.getElementById('langRu').className = `px-3 h-8 text-[10px] font-black rounded-lg transition-all ${currentLang === 'ru' ? 'bg-white dark:bg-slate-700 shadow-sm text-brand' : 'text-slate-400 hover:text-slate-600'}`;

        lucide.createIcons();
    }

    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    themeToggle.onclick = () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        setTimeout(() => lucide.createIcons(), 10);
    };

    const aboutModal = document.getElementById('aboutModal');
    document.getElementById('aboutBtn').onclick = () => aboutModal.classList.remove('hidden');
    document.getElementById('closeModal').onclick = () => aboutModal.classList.add('hidden');
    window.onclick = (e) => { if(e.target === aboutModal) aboutModal.classList.add('hidden'); };

    document.getElementById('langEn').onclick = () => { currentLang = 'en'; localStorage.setItem('lang', 'en'); updateUI(); };
    document.getElementById('langRu').onclick = () => { currentLang = 'ru'; localStorage.setItem('lang', 'ru'); updateUI(); };

    updateUI();
</script>
</body>
</html>
